<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-400 to-blue-600">

  <!-- Weather Card -->
  <div class="bg-slate-100/90 w-[90%] max-w-md p-6 rounded-2xl shadow-lg backdrop-blur-sm">

    <h1 class="text-2xl font-semibold text-center mb-6 text-gray-900">
      Weather App
    </h1>

    <!-- Input Section -->
    <div class="flex gap-2">
      <input
        id="cityInput"
        type="text"
        placeholder="Enter city name"
        class="flex-1 px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400"/>

      <button
        id="getWeatherBtn"
        class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition"
      >
        Get Weather
      </button>
    </div>

    <!-- Weather Output -->
    <div id="weatherResult" class="mt-6 hidden text-center">
      <h2 id="cityName" class="text-xl font-semibold text-gray-700"></h2>
      <p id="temperature" class="text-4xl font-bold text-blue-500 mt-2"></p>
      <p id="weatherCondition" class="text-gray-600 mt-1"></p>
    </div>

    <!-- Error -->
    <p id="errorMessage" class="text-red-500 text-center mt-4 hidden">
      City not found. Please try again.
    </p>

  </div>

  <script src="script.js"></script>
</body>
</html>
